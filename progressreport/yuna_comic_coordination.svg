<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
    <!-- 🎨 YUNA COMIC STYLE: ITZY CEO Agents 协调架构流程图 -->
    
    <!-- 漫画风格滤镜定义 -->
    <defs>
        <!-- 手绘描边效果 -->
        <filter id="sketchEffect" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        
        <!-- 柔和阴影 -->
        <filter id="softDrop" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="2" flood-opacity="0.15"/>
        </filter>
        
        <!-- 便利贴渐变 -->
        <linearGradient id="stickyYellow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFF9C4"/>
            <stop offset="100%" style="stop-color:#FFE082"/>
        </linearGradient>
        <linearGradient id="stickyPink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FCE4EC"/>
            <stop offset="100%" style="stop-color:#F8BBD9"/>
        </linearGradient>
        <linearGradient id="stickyGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#E8F5E9"/>
            <stop offset="100%" style="stop-color:#C8E6C9"/>
        </linearGradient>
        <linearGradient id="stickyBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#E3F2FD"/>
            <stop offset="100%" style="stop-color:#BBDEFB"/>
        </linearGradient>
        <linearGradient id="stickyPurple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F3E5F5"/>
            <stop offset="100%" style="stop-color:#E1BEE7"/>
        </linearGradient>
        <linearGradient id="stickyOrange" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFF3E0"/>
            <stop offset="100%" style="stop-color:#FFE0B2"/>
        </linearGradient>
        
        <!-- 动画样式 -->
        <style>
            @keyframes wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-1.5deg); } 75% { transform: rotate(1.5deg); } }
            @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
            .comic-wiggle { animation: wiggle 2.5s ease-in-out infinite; }
            .comic-bounce { animation: bounce 2s ease-in-out infinite; }
            .comic-pop { animation: pop 2s ease-in-out infinite; }
        </style>
    </defs>
    
    <!-- 温暖米白背景 -->
    <rect width="100%" height="100%" fill="#FFF8F0"/>
    
    <!-- 装饰性圆点 -->
    <g opacity="0.25">
        <circle cx="40" cy="40" r="8" fill="#FFB6C1"/>
        <circle cx="120" cy="70" r="6" fill="#87CEEB"/>
        <circle cx="960" cy="50" r="10" fill="#98FB98"/>
        <circle cx="920" cy="600" r="7" fill="#DDA0DD"/>
        <circle cx="80" cy="580" r="5" fill="#F0E68C"/>
        <circle cx="500" cy="30" r="4" fill="#FF6B9D"/>
        <circle cx="800" cy="620" r="6" fill="#06D6A0"/>
    </g>
    
    <!-- 白板框架 -->
    <g filter="url(#softDrop)">
        <rect x="60" y="40" width="880" height="570" rx="15" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="3"/>
        <rect x="60" y="40" width="880" height="30" rx="15" fill="#FF6B9D" opacity="0.85"/>
        <text x="500" y="60" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">✨ ITZY CEO Agents Team Workspace ✨</text>
    </g>
    
    <!-- ===== 流程连接线 ===== -->
    <g stroke-width="3" fill="none" opacity="0.6">
        <!-- Yeji → Lia -->
        <path d="M 240 220 Q 290 180 340 240" stroke="#4ECDC4" stroke-dasharray="8,4" class="comic-wiggle"/>
        <polygon points="335,235 345,240 335,245" fill="#4ECDC4"/>
        
        <!-- Lia → Chaeryeong -->
        <path d="M 440 240 Q 500 200 560 200" stroke="#9D65FF" stroke-dasharray="8,4"/>
        <polygon points="555,195 565,200 555,205" fill="#9D65FF"/>
        
        <!-- Yeji → Yuna -->
        <path d="M 240 280 Q 320 380 400 420" stroke="#4ECDC4" stroke-dasharray="6,3"/>
        <polygon points="395,415 405,420 400,425" fill="#4ECDC4"/>
        
        <!-- Chaeryeong → Yuna -->
        <path d="M 560 280 Q 500 380 460 420" stroke="#FFD166" stroke-dasharray="6,3"/>
        <polygon points="455,415 465,420 460,425" fill="#FFD166"/>
        
        <!-- Yuna → Leader -->
        <path d="M 480 460 Q 580 400 720 260" stroke="#FF6B8B" stroke-width="4" stroke-dasharray="10,5" class="comic-bounce"/>
        <polygon points="715,255 725,260 720,265" fill="#FF6B8B"/>
        
        <!-- Ryujin → Leader -->
        <path d="M 860 260 L 780 260" stroke="#06D6A0" stroke-width="4" class="comic-pop"/>
        <polygon points="785,255 775,260 785,265" fill="#06D6A0"/>
        
        <!-- QA → 各Agent -->
        <path d="M 860 180 Q 650 100 240 160" stroke="#06D6A0" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
        <path d="M 860 300 Q 650 320 560 280" stroke="#FFD166" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
        <path d="M 860 340 Q 650 360 440 280" stroke="#9D65FF" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
    </g>
    
    <!-- ===== LEADER 卡片 ===== -->
    <g class="comic-pop" transform="translate(720, 180)">
        <rect x="-75" y="-65" width="150" height="130" rx="8" fill="url(#stickyPink)" filter="url(#softDrop)"/>
        <polygon points="75,-65 75,-45 55,-65" fill="#F8BBD9" opacity="0.7"/>
        
        <!-- 人物头像 -->
        <circle cy="-20" r="28" fill="#FFB6C1" stroke="#FF6B9D" stroke-width="2.5"/>
        <circle cx="-9" cy="-25" r="3.5" fill="#333"/>
        <circle cx="9" cy="-25" r="3.5" fill="#333"/>
        <path d="M -12 -10 Q 0 -5 12 -10" stroke="#333" stroke-width="2.5" fill="none"/>
        <ellipse cy="-48" rx="24" ry="10" fill="#FF6B9D"/>
        
        <!-- 标签 -->
        <text y="20" text-anchor="middle" fill="#FF6B9D" font-size="18" font-weight="bold">👑 LEADER</text>
        <text y="40" text-anchor="middle" fill="#666" font-size="12">协调中枢</text>
        
        <!-- 功能标签 -->
        <rect x="-50" y="55" width="100" height="22" rx="4" fill="#FFE082"/>
        <text x="0" y="70" text-anchor="middle" fill="#666" font-size="10">⚡ 协调引擎</text>
        
        <!-- 对话气泡 -->
        <g transform="translate(70, -90)">
            <ellipse rx="38" ry="22" fill="#FFF" stroke="#FF6B9D" stroke-width="2"/>
            <polygon points="-5,22 5,32 15,22" fill="#FFF" stroke="#FF6B9D" stroke-width="2"/>
            <text y="4" text-anchor="middle" fill="#FF6B9D" font-size="10">资源分配OK!</text>
        </g>
    </g>
    
    <!-- ===== YEJI 卡片 ===== -->
    <g transform="translate(200, 220)">
        <rect x="-60" y="-50" width="120" height="100" rx="6" fill="url(#stickyGreen)" filter="url(#softDrop)"/>
        <polygon points="60,-50 60,-32 42,-50" fill="#C8E6C9" opacity="0.7"/>
        
        <!-- 人物头像 -->
        <circle cy="-15" r="22" fill="#B2DFDB" stroke="#4ECDC4" stroke-width="2.5"/>
        <circle cx="-7" cy="-20" r="3" fill="#333"/>
        <circle cx="7" cy="-20" r="3" fill="#333"/>
        <path d="M -10 -8 Q 0 -4 10 -8" stroke="#333" stroke-width="2" fill="none"/>
        <!-- 工程帽 -->
        <rect x="-20" y="-42" width="40" height="12" rx="3" fill="#4ECDC4"/>
        
        <!-- 标签 -->
        <text y="20" text-anchor="middle" fill="#4ECDC4" font-size="16" font-weight="bold">🧢 YEJI</text>
        <text y="38" text-anchor="middle" fill="#666" font-size="11">土木工程</text>
        
        <!-- Subagent -->
        <rect x="-45" y="45" width="90" height="18" rx="3" fill="#E8F5E9"/>
        <text x="0" y="58" text-anchor="middle" fill="#4ECDC4" font-size="9">结构·材料·规范</text>
    </g>
    
    <!-- ===== LIA 卡片 ===== -->
    <g transform="translate(420, 240)">
        <rect x="-55" y="-45" width="110" height="90" rx="6" fill="url(#stickyPurple)" filter="url(#softDrop)"/>
        <polygon points="55,-45 55,-28 38,-45" fill="#E1BEE7" opacity="0.7"/>
        
        <!-- 人物头像 -->
        <circle cy="-12" r="20" fill="#E1BEE7" stroke="#9D65FF" stroke-width="2.5"/>
        <circle cx="-6" cy="-16" r="2.5" fill="#333"/>
        <circle cx="6" cy="-16" r="2.5" fill="#333"/>
        <path d="M -8 -4 Q 0 0 8 -4" stroke="#333" stroke-width="2" fill="none"/>
        <!-- 眼镜 -->
        <rect x="-14" y="-22" width="12" height="7" rx="2" fill="none" stroke="#9D65FF" stroke-width="1.5"/>
        <rect x="2" y="-22" width="12" height="7" rx="2" fill="none" stroke="#9D65FF" stroke-width="1.5"/>
        <line x1="-2" y1="-18" x2="2" y2="-18" stroke="#9D65FF" stroke-width="1.5"/>
        
        <!-- 标签 -->
        <text y="18" text-anchor="middle" fill="#9D65FF" font-size="15" font-weight="bold">💜 LIA</text>
        <text y="35" text-anchor="middle" fill="#666" font-size="11">数据中枢</text>
        
        <!-- 功能标签 -->
        <rect x="-40" y="42" width="80" height="16" rx="3" fill="#F3E5F5"/>
        <text x="0" y="53" text-anchor="middle" fill="#9D65FF" font-size="9">📊 API·架构</text>
    </g>
    
    <!-- ===== CHAERYEONG 卡片 ===== -->
    <g transform="translate(600, 220)">
        <rect x="-60" y="-50" width="120" height="100" rx="6" fill="url(#stickyYellow)" filter="url(#softDrop)"/>
        <polygon points="60,-50 60,-32 42,-50" fill="#FFE082" opacity="0.7"/>
        
        <!-- 人物头像 -->
        <circle cy="-15" r="22" fill="#FFF9C4" stroke="#FFD166" stroke-width="2.5"/>
        <circle cx="-7" cy="-20" r="3" fill="#333"/>
        <circle cx="7" cy="-20" r="3" fill="#333"/>
        <path d="M -10 -8 Q 0 -4 10 -8" stroke="#333" stroke-width="2" fill="none"/>
        <!-- 发带 -->
        <rect x="-25" y="-35" width="50" height="6" rx="3" fill="#FFD166"/>
        
        <!-- 标签 -->
        <text y="20" text-anchor="middle" fill="#FFD166" font-size="15" font-weight="bold">💛 CHAERYEONG</text>
        <text y="38" text-anchor="middle" fill="#666" font-size="11">网站系统</text>
        
        <!-- Subagent -->
        <rect x="-45" y="45" width="90" height="18" rx="3" fill="#FFF3E0"/>
        <text x="0" y="58" text-anchor="middle" fill="#FFD166" font-size="9">前端·UI·UX</text>
    </g>
    
    <!-- ===== YUNA 卡片 ===== -->
    <g class="comic-bounce" transform="translate(450, 450)">
        <!-- 菱形便利贴 -->
        <polygon points="0,-55 60,0 0,55 -60,0" fill="url(#stickyPink)" filter="url(#softDrop)"/>
        
        <!-- 人物头像 -->
        <circle cy="-12" r="20" fill="#FCE4EC" stroke="#FF6B8B" stroke-width="2.5"/>
        <circle cx="-6" cy="-16" r="2.5" fill="#333"/>
        <circle cx="6" cy="-16" r="2.5" fill="#333"/>
        <!-- 星星眼 -->
        <text x="-6" y="-14" fill="#FF6B8B" font-size="5">✦</text>
        <text x="6" y="-14" fill="#FF6B8B" font-size="5">✦</text>
        <path d="M -6 2 Q 0 5 6 2" stroke="#333" stroke-width="2" fill="none"/>
        <!-- 画笔 -->
        <rect x="20" y="-5" width="18" height="4" rx="2" fill="#FF6B8B"/>
        <polygon points="38,-5 43,-3 38,-1" fill="#333"/>
        
        <!-- 标签 -->
        <text y="28" text-anchor="middle" fill="#FF6B8B" font-size="14" font-weight="bold">💗 YUNA</text>
        <text y="42" text-anchor="middle" fill="#666" font-size="10">可视化引擎</text>
        
        <!-- 功能标签 -->
        <rect x="-35" y="50" width="70" height="15" rx="3" fill="#FCE4EC"/>
        <text x="0" y="61" text-anchor="middle" fill="#FF6B8B" font-size="8">🎨 图表·动画</text>
        
        <!-- 小画板 -->
        <g transform="translate(-65, -25)">
            <rect width="28" height="22" rx="3" fill="#FFF" stroke="#FF6B8B" stroke-width="1.5"/>
            <circle cx="14" cy="11" r="6" fill="#FFE082"/>
        </g>
    </g>
    
    <!-- ===== RYUJIN 卡片 ===== -->
    <g transform="translate(870, 260)">
        <rect x="-50" y="-80" width="100" height="160" rx="6" fill="url(#stickyGreen)" filter="url(#softDrop)"/>
        <polygon points="50,-80 50,-60 30,-80" fill="#C8E6C9" opacity="0.7"/>
        
        <!-- 人物头像 -->
        <circle cy="-50" r="24" fill="#C8E6C9" stroke="#06D6A0" stroke-width="2.5"/>
        <circle cx="-8" cy="-55" r="3.5" fill="#333"/>
        <circle cx="8" cy="-55" r="3.5" fill="#333"/>
        <!-- 冷酷表情 -->
        <line x1="-10" y1="-42" x2="10" y2="-42" stroke="#333" stroke-width="2.5"/>
        <!-- QA帽 -->
        <rect x="-20" y="-78" width="40" height="10" rx="3" fill="#06D6A0"/>
        <text x="0" y="-71" text-anchor="middle" fill="#fff" font-size="6">QA</text>
        
        <!-- 标签 -->
        <text y="-15" text-anchor="middle" fill="#06D6A0" font-size="14" font-weight="bold">💚 RYUJIN</text>
        <text y="0" text-anchor="middle" fill="#666" font-size="11">质量测试</text>
        
        <!-- QA引擎 -->
        <rect x="-40" y="12" width="80" height="16" rx="3" fill="#E8F5E9"/>
        <text x="0" y="23" text-anchor="middle" fill="#06D6A0" font-size="8">⚡ qa_engine.py</text>
        
        <!-- Subagent列表 -->
        <rect x="-40" y="35" width="80" height="40" rx="3" fill="#FFF" opacity="0.7"/>
        <text x="0" y="45" text-anchor="middle" fill="#06D6A0" font-size="8">自动化测试</text>
        <text x="0" y="55" text-anchor="middle" fill="#06D6A0" font-size="8">安全审计</text>
        <text x="0" y="65" text-anchor="middle" fill="#06D6A0" font-size="8">性能分析</text>
        
        <!-- 状态徽章 -->
        <rect x="-30" y="78" width="60" height="18" rx="9" fill="#06D6A0"/>
        <text x="0" y="91" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">PASS ✓</text>
        
        <!-- 对话气泡 -->
        <g transform="translate(50, -65)">
            <ellipse rx="32" ry="18" fill="#FFF" stroke="#06D6A0" stroke-width="2"/>
            <polygon points="-3,18 3,28 12,18" fill="#FFF" stroke="#06D6A0" stroke-width="2"/>
            <text y="4" text-anchor="middle" fill="#06D6A0" font-size="9">测试完成!</text>
        </g>
    </g>
    
    <!-- 流程小标签 -->
    <g opacity="0.85">
        <g transform="translate(290, 170)">
            <rect width="55" height="20" rx="4" fill="url(#stickyYellow)"/>
            <text x="27" y="14" text-anchor="middle" fill="#666" font-size="9">数据输出</text>
        </g>
        <g transform="translate(540, 190)">
            <rect width="50" height="20" rx="4" fill="url(#stickyPurple)"/>
            <text x="25" y="14" text-anchor="middle" fill="#666" font-size="9">API服务</text>
        </g>
        <g transform="translate(310, 350)">
            <rect width="50" height="20" rx="4" fill="url(#stickyGreen)"/>
            <text x="25" y="14" text-anchor="middle" fill="#666" font-size="9">分析结果</text>
        </g>
        <g transform="translate(510, 350)">
            <rect width="50" height="20" rx="4" fill="url(#stickyOrange)"/>
            <text x="25" y="14" text-anchor="middle" fill="#666" font-size="9">UI组件</text>
        </g>
        <g transform="translate(580, 380)">
            <rect width="55" height="20" rx="4" fill="url(#stickyPink)"/>
            <text x="27" y="14" text-anchor="middle" fill="#666" font-size="9">可视化</text>
        </g>
        <g transform="translate(820, 320)">
            <rect width="65" height="20" rx="4" fill="url(#stickyGreen)"/>
            <text x="32" y="14" text-anchor="middle" fill="#06D6A0" font-size="8" font-weight="bold">QA测试</text>
        </g>
    </g>
    
    <!-- 状态指示圆点 -->
    <g class="comic-bounce">
        <circle cx="200" cy="280" r="7" fill="#06D6A0"/>
        <circle cx="420" cy="300" r="6" fill="#FFD166"/>
        <circle cx="600" cy="280" r="6" fill="#FFD166"/>
        <circle cx="450" cy="500" r="7" fill="#FF6B8B"/>
        <circle cx="870" cy="420" r="7" fill="#06D6A0"/>
        <circle cx="720" cy="310" r="9" fill="#FF6B9D"/>
    </g>
    
    <!-- Yuna签名 -->
    <g transform="translate(950, 630)">
        <text fill="#FF6B8B" font-size="12" font-style="italic" opacity="0.7">✨ YUNA Comic Style</text>
        <text y="14" fill="#06D6A0" font-size="9" opacity="0.5">Designed with 💗</text>
    </g>
    
    <!-- 装饰元素 -->
    <g opacity="0.5">
        <text x="100" y="110" fill="#FF6B9D" font-size="18">✿</text>
        <text x="900" y="100" fill="#FFD166" font-size="16">★</text>
        <text x="120" y="550" fill="#06D6A0" font-size="14">✓</text>
        <text x="880" y="560" fill="#9D65FF" font-size="16">◆</text>
    </g>
</svg>