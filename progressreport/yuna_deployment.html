<!-- 🎨 YUNA FUTURE STYLE: k2-web 部署流程图 -->
<section class="yuna-deployment-section">
    <div class="chart-label future-label" style="background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,209,102,0.1)); border-color: #FFD166; color: #FFD166;">
        <i class="fas fa-sitemap"></i>
        <span>YUNA DEPLOYMENT FLOW</span>
    </div>
    <h3><i class="fas fa-project-diagram"></i> k2-web 部署流程图 - 未来科技风格</h3>
    
    <div class="yuna-deployment-container">
        <svg class="yuna-deployment-svg" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
            <!-- 霓虹渐变定义 -->
            <defs>
                <!-- 霓虹发光滤镜 -->
                <filter id="deployNeonCyan" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feFlood flood-color="#00fff2" flood-opacity="0.5"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="deployNeonYellow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feFlood flood-color="#FFD166" flood-opacity="0.5"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="deployNeonPink" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#FF6B9D" flood-opacity="0.6"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="deployNeonPurple" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feFlood flood-color="#9D65FF" flood-opacity="0.5"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- 区域渐变 -->
                <linearGradient id="completedZoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#06D6A0" stop-opacity="0.1"/>
                    <stop offset="100%" style="stop-color:#06D6A0" stop-opacity="0.05"/>
                </linearGradient>
                
                <linearGradient id="progressZoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#FF6B9D" stop-opacity="0.1"/>
                    <stop offset="100%" style="stop-color:#FF6B9D" stop-opacity="0.05"/>
                </linearGradient>
                
                <linearGradient id="pendingZoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#9D65FF" stop-opacity="0.1"/>
                    <stop offset="100%" style="stop-color:#9D65FF" stop-opacity="0.05"/>
                </linearGradient>
                
                <!-- 连接线渐变 -->
                <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#06D6A0"/>
                    <stop offset="50%" style="stop-color:#FF6B9D"/>
                    <stop offset="100%" style="stop-color:#9D65FF"/>
                </linearGradient>
                
                <!-- 背景渐变 -->
                <linearGradient id="deployBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0a0a1a"/>
                    <stop offset="100%" style="stop-color:#1a1a2e"/>
                </linearGradient>
                
                <!-- 网格图案 -->
                <pattern id="deployGridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
                    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00fff2" stroke-width="0.2" opacity="0.15"/>
                </pattern>
                
                <!-- 动画 -->
                <style>
                    @keyframes flowPulse { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
                    @keyframes cardFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
                    @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
                    .flow-line { animation: flowPulse 1s linear infinite; }
                    .card-float { animation: cardFloat 2s ease-in-out infinite; }
                    .status-pulse { animation: statusPulse 1.5s ease-in-out infinite; }
                </style>
            </defs>
            
            <!-- 深色背景 -->
            <rect width="900" height="500" fill="url(#deployBgGrad)"/>
            <rect width="900" height="500" fill="url(#deployGridPattern)"/>
            
            <!-- 标题 -->
            <g class="deployment-header" transform="translate(450, 30)">
                <text x="0" y="0" text-anchor="middle" fill="#00fff2" font-size="16" font-weight="bold" filter="url(#deployNeonCyan)">
                    🚀 k2-web Deployment Pipeline 🚀
                </text>
                <text x="0" y="18" text-anchor="middle" fill="#888" font-size="10">
                    chaeryeong.design → leader.coordination
                </text>
            </g>
            
            <!-- ===== 三区域划分 ===== -->
            
            <!-- COMPLETED 区域 -->
            <g class="completed-zone" transform="translate(50, 60)">
                <rect width="200" height="400" rx="10" fill="url(#completedZoneGrad)" stroke="#06D6A0" stroke-width="2" opacity="0.8"/>
                
                <!-- 区域标题 -->
                <g transform="translate(100, 25)">
                    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#06D6A0" opacity="0.2"/>
                    <text x="0" y="5" text-anchor="middle" fill="#06D6A0" font-size="12" font-weight="bold">✅ COMPLETED</text>
                </g>
                
                <!-- 任务卡片 -->
                <g class="task-cards" transform="translate(10, 70)">
                    <!-- Task 1: 目录结构 -->
                    <g class="task-card card-float" transform="translate(0, 0)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1"/>
                        <circle cx="15" cy="25" r="8" fill="#06D6A0" filter="url(#deployNeonCyan)"/>
                        <text x="30" y="15" fill="#06D6A0" font-size="10" font-weight="bold">目录结构创建</text>
                        <text x="30" y="30" fill="#888" font-size="8">leader</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#06D6A0" opacity="0.3"/>
                        <text x="150" y="42" text-anchor="middle" fill="#06D6A0" font-size="7">DONE</text>
                    </g>
                    
                    <!-- Task 2: CSS -->
                    <g class="task-card card-float" transform="translate(0, 60)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1"/>
                        <circle cx="15" cy="25" r="8" fill="#06D6A0" filter="url(#deployNeonCyan)"/>
                        <text x="30" y="15" fill="#06D6A0" font-size="10" font-weight="bold">CSS 样式系统</text>
                        <text x="30" y="30" fill="#888" font-size="8">chaeryeong</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#06D6A0" opacity="0.3"/>
                        <text x="150" y="42" text-anchor="middle" fill="#06D6A0" font-size="7">DONE</text>
                    </g>
                    
                    <!-- Task 3: 导航栏 -->
                    <g class="task-card card-float" transform="translate(0, 120)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1"/>
                        <circle cx="15" cy="25" r="8" fill="#06D6A0" filter="url(#deployNeonCyan)"/>
                        <text x="30" y="15" fill="#06D6A0" font-size="10" font-weight="bold">导航栏设计</text>
                        <text x="30" y="30" fill="#888" font-size="8">chaeryeong</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#06D6A0" opacity="0.3"/>
                        <text x="150" y="42" text-anchor="middle" fill="#06D6A0" font-size="7">DONE</text>
                    </g>
                    
                    <!-- Task 4: 首页 -->
                    <g class="task-card card-float" transform="translate(0, 180)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1"/>
                        <circle cx="15" cy="25" r="8" fill="#06D6A0" filter="url(#deployNeonCyan)"/>
                        <text x="30" y="15" fill="#06D6A0" font-size="10" font-weight="bold">首页 index.html</text>
                        <text x="30" y="30" fill="#888" font-size="8">chaeryeong</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#06D6A0" opacity="0.3"/>
                        <text x="150" y="42" text-anchor="middle" fill="#06D6A0" font-size="7">DONE</text>
                    </g>
                    
                    <!-- Task 5: agents.html -->
                    <g class="task-card card-float" transform="translate(0, 240)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1"/>
                        <circle cx="15" cy="25" r="8" fill="#06D6A0" filter="url(#deployNeonCyan)"/>
                        <text x="30" y="15" fill="#06D6A0" font-size="10" font-weight="bold">agents.html</text>
                        <text x="30" y="30" fill="#888" font-size="8">chaeryeong</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#06D6A0" opacity="0.3"/>
                        <text x="150" y="42" text-anchor="middle" fill="#06D6A0" font-size="7">DONE</text>
                    </g>
                </g>
                
                <!-- 区域统计 -->
                <g transform="translate(100, 360)">
                    <text x="0" y="0" text-anchor="middle" fill="#06D6A0" font-size="14" font-weight="bold">5</text>
                    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="8">tasks</text>
                </g>
            </g>
            
            <!-- IN PROGRESS 区域 -->
            <g class="in-progress-zone" transform="translate(350, 60)">
                <rect width="200" height="400" rx="10" fill="url(#progressZoneGrad)" stroke="#FF6B9D" stroke-width="2" opacity="0.8"/>
                
                <!-- 区域标题 -->
                <g transform="translate(100, 25)">
                    <rect x="-55" y="-15" width="110" height="30" rx="15" fill="#FF6B9D" opacity="0.2"/>
                    <text x="0" y="5" text-anchor="middle" fill="#FF6B9D" font-size="12" font-weight="bold">🔄 IN PROGRESS</text>
                </g>
                
                <!-- 任务卡片 -->
                <g class="task-cards" transform="translate(10, 70)">
                    <!-- Task: progressreport.html -->
                    <g class="task-card card-float" transform="translate(0, 0)">
                        <rect width="180" height="70" rx="8" fill="#1a1a2e" stroke="#FF6B9D" stroke-width="1.5"/>
                        <circle cx="15" cy="25" r="8" fill="#FF6B9D" filter="url(#deployNeonPink)" class="status-pulse"/>
                        <text x="30" y="15" fill="#FF6B9D" font-size="10" font-weight="bold">progressreport.html</text>
                        <text x="30" y="30" fill="#888" font-size="8">leader</text>
                        
                        <!-- 进度条 -->
                        <rect x="15" y="45" width="150" height="8" rx="4" fill="#1a1a2e" stroke="#FF6B9D" stroke-width="0.5"/>
                        <rect x="15" y="45" width="90" height="8" rx="4" fill="#FF6B9D" opacity="0.7"/>
                        <text x="100" y="55" fill="#FF6B9D" font-size="7">60%</text>
                        
                        <!-- 状态徽章 -->
                        <rect x="130" y="55" width="40" height="10" rx="5" fill="#FF6B9D" opacity="0.3"/>
                        <text x="150" y="62" text-anchor="middle" fill="#FF6B9D" font-size="7">WIP</text>
                    </g>
                    
                    <!-- 当前活动指示 -->
                    <g transform="translate(90, 100)">
                        <ellipse rx="45" ry="20" fill="#FF6B9D" opacity="0.1" stroke="#FF6B9D" stroke-width="1"/>
                        <text x="0" y="5" text-anchor="middle" fill="#FF6B9D" font-size="9">⚡ ACTIVE</text>
                    </g>
                </g>
                
                <!-- 区域统计 -->
                <g transform="translate(100, 360)">
                    <text x="0" y="0" text-anchor="middle" fill="#FF6B9D" font-size="14" font-weight="bold">1</text>
                    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="8">task</text>
                </g>
            </g>
            
            <!-- PENDING 区域 -->
            <g class="pending-zone" transform="translate(650, 60)">
                <rect width="200" height="400" rx="10" fill="url(#pendingZoneGrad)" stroke="#9D65FF" stroke-width="2" opacity="0.8"/>
                
                <!-- 区域标题 -->
                <g transform="translate(100, 25)">
                    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#9D65FF" opacity="0.2"/>
                    <text x="0" y="5" text-anchor="middle" fill="#9D65FF" font-size="12" font-weight="bold">⏳ PENDING</text>
                </g>
                
                <!-- 任务卡片 -->
                <g class="task-cards" transform="translate(10, 70)">
                    <!-- Task 1: 进度数据API -->
                    <g class="task-card" transform="translate(0, 0)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#9D65FF" stroke-width="0.5" opacity="0.7"/>
                        <circle cx="15" cy="25" r="8" fill="#9D65FF" opacity="0.5"/>
                        <text x="30" y="15" fill="#9D65FF" font-size="10">进度数据 API</text>
                        <text x="30" y="30" fill="#888" font-size="8">lia</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#9D65FF" opacity="0.2"/>
                        <text x="150" y="42" text-anchor="middle" fill="#9D65FF" font-size="7">WAIT</text>
                    </g>
                    
                    <!-- Task 2: coordination_engine -->
                    <g class="task-card" transform="translate(0, 60)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#9D65FF" stroke-width="0.5" opacity="0.7"/>
                        <circle cx="15" cy="25" r="8" fill="#9D65FF" opacity="0.5"/>
                        <text x="30" y="15" fill="#9D65FF" font-size="10">coordination_engine.py</text>
                        <text x="30" y="30" fill="#888" font-size="8">leader</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#9D65FF" opacity="0.2"/>
                        <text x="150" y="42" text-anchor="middle" fill="#9D65FF" font-size="7">WAIT</text>
                    </g>
                    
                    <!-- Task 3: qa_engine -->
                    <g class="task-card" transform="translate(0, 120)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#9D65FF" stroke-width="0.5" opacity="0.7"/>
                        <circle cx="15" cy="25" r="8" fill="#9D65FF" opacity="0.5"/>
                        <text x="30" y="15" fill="#9D65FF" font-size="10">qa_engine.py</text>
                        <text x="30" y="30" fill="#888" font-size="8">ryujin</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#9D65FF" opacity="0.2"/>
                        <text x="150" y="42" text-anchor="middle" fill="#9D65FF" font-size="7">WAIT</text>
                    </g>
                    
                    <!-- Task 4: SUBAGENTS -->
                    <g class="task-card" transform="translate(0, 180)">
                        <rect width="180" height="50" rx="8" fill="#1a1a2e" stroke="#9D65FF" stroke-width="0.5" opacity="0.7"/>
                        <circle cx="15" cy="25" r="8" fill="#9D65FF" opacity="0.5"/>
                        <text x="30" y="15" fill="#9D65FF" font-size="10">SUBAGENTS.md</text>
                        <text x="30" y="30" fill="#888" font-size="8">leader</text>
                        <rect x="130" y="35" width="40" height="10" rx="5" fill="#9D65FF" opacity="0.2"/>
                        <text x="150" y="42" text-anchor="middle" fill="#9D65FF" font-size="7">WAIT</text>
                    </g>
                </g>
                
                <!-- 区域统计 -->
                <g transform="translate(100, 360)">
                    <text x="0" y="0" text-anchor="middle" fill="#9D65FF" font-size="14" font-weight="bold">4</text>
                    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="8">tasks</text>
                </g>
            </g>
            
            <!-- ===== 流动连接线 ===== -->
            <g class="flow-connections">
                <!-- Completed → In Progress -->
                <g transform="translate(250, 160)">
                    <path d="M 0 0 Q 50 -20 100 0" stroke="url(#flowGradient)" stroke-width="3" fill="none" stroke-dasharray="10,5" class="flow-line"/>
                    <polygon points="95,-5 105,0 95,5" fill="#FF6B9D"/>
                </g>
                
                <!-- In Progress → Pending -->
                <g transform="translate(550, 160)">
                    <path d="M 0 0 Q 50 -20 100 0" stroke="url(#flowGradient)" stroke-width="3" fill="none" stroke-dasharray="10,5" class="flow-line"/>
                    <polygon points="95,-5 105,0 95,5" fill="#9D65FF"/>
                </g>
                
                <!-- 虚线反馈回路 -->
                <g transform="translate(750, 400)" opacity="0.4">
                    <path d="M 0 0 Q -350 50 -700 0" stroke="#00fff2" stroke-width="1" fill="none" stroke-dasharray="5,5"/>
                    <text x="-350" y="35" fill="#00fff2" font-size="8" text-anchor="middle">QA Feedback Loop</text>
                </g>
            </g>
            
            <!-- 进度指示器 -->
            <g class="progress-indicator" transform="translate(450, 480)">
                <rect x="-200" y="-10" width="400" height="20" rx="10" fill="#1a1a2e" stroke="#00fff2" stroke-width="1"/>
                <rect x="-200" y="-10" width="200" height="20" rx="10" fill="url(#flowGradient)" opacity="0.7"/>
                <text x="0" y="2" text-anchor="middle" fill="#00fff2" font-size="10" font-weight="bold">50% Complete</text>
            </g>
            
            <!-- Yuna 签名 -->
            <g class="yuna-signature" transform="translate(850, 480)">
                <text fill="#FF6B8B" font-size="10" font-style="italic" opacity="0.6">✨ Designed by YUNA</text>
            </g>
            
            <!-- Agent 分配指示 -->
            <g class="agent-indicators" transform="translate(20, 480)">
                <g transform="translate(0, 0)">
                    <circle r="5" fill="#FF6B9D"/>
                    <text x="10" y="3" fill="#888" font-size="7">leader</text>
                </g>
                <g transform="translate(60, 0)">
                    <circle r="5" fill="#FFD166"/>
                    <text x="10" y="3" fill="#888" font-size="7">chaeryeong</text>
                </g>
                <g transform="translate(140, 0)">
                    <circle r="5" fill="#9D65FF"/>
                    <text x="10" y="3" fill="#888" font-size="7">lia</text>
                </g>
                <g transform="translate(200, 0)">
                    <circle r="5" fill="#06D6A0"/>
                    <text x="10" y="3" fill="#888" font-size="7">ryujin</text>
                </g>
            </g>
        </svg>
    </div>
    
    <!-- 图例 -->
    <div class="yuna-legend deployment-legend">
        <div class="legend-item future-item">
            <span class="legend-zone" style="background: linear-gradient(135deg, #06D6A0, #00fff2); opacity: 0.8;"></span>
            <span>✅ Completed Zone (5 tasks)</span>
        </div>
        <div class="legend-item future-item">
            <span class="legend-zone" style="background: linear-gradient(135deg, #FF6B9D, #FF9EC4);"></span>
            <span>🔄 In Progress Zone (1 task)</span>
        </div>
        <div class="legend-item future-item">
            <span class="legend-zone" style="background: linear-gradient(135deg, #9D65FF, #C9A0FF); opacity: 0.5;"></span>

        <div class="legend-item future-item">
            <span class="legend-flow" style="background: linear-gradient(90deg, #06D6A0, #FF6B9D, #9D65FF);"></span>
            <span>🌊 Data Flow</span>
        </div>
    </div>
</section>
