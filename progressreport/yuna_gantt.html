<!-- 🎨 YUNA FUTURE STYLE: 项目进度 Gantt 图 -->
<section class="yuna-gantt-section">
    <div class="chart-label future-label" style="background: linear-gradient(135deg, rgba(0,255,242,0.15), rgba(157,101,255,0.1)); border-color: #00fff2; color: #00fff2;">
        <i class="fas fa-chart-gantt"></i>
        <span>YUNA FUTURE VISUALIZATION</span>
    </div>
    <h3><i class="fas fa-timeline"></i> 项目进度 Gantt 图 - 未来霓虹风格</h3>
    
    <div class="yuna-gantt-container">
        <svg class="yuna-gantt-svg" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
            <!-- 霓虹渐变定义 -->
            <defs>
                <!-- 霓虹发光滤镜 -->
                <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#00fff2" flood-opacity="0.5"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="neonGlowPink" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#FF6B9D" flood-opacity="0.6"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="neonGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#06D6A0" flood-opacity="0.5"/>
                    <feComposite in2="blur" operator="in"/>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- 进度条渐变 -->
                <linearGradient id="progressGradientGreen" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#06D6A0"/>
                    <stop offset="50%" style="stop-color:#00fff2"/>
                    <stop offset="100%" style="stop-color:#06D6A0"/>
                </linearGradient>
                
                <linearGradient id="progressGradientPink" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#FF6B9D"/>
                    <stop offset="50%" style="stop-color:#FF9EC4"/>
                    <stop offset="100%" style="stop-color:#FF6B9D"/>
                </linearGradient>
                
                <linearGradient id="progressGradientPurple" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#9D65FF"/>
                    <stop offset="50%" style="stop-color:#C9A0FF"/>
                    <stop offset="100%" style="stop-color:#9D65FF"/>
                </linearGradient>
                
                <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0a0a1a"/>
                    <stop offset="100%" style="stop-color:#1a1a2e"/>
                </linearGradient>
                
                <!-- 网格图案 -->
                <pattern id="gridPattern" width="50" height="30" patternUnits="userSpaceOnUse">
                    <path d="M 50 0 L 0 0 0 30" fill="none" stroke="#00fff2" stroke-width="0.3" opacity="0.2"/>
                </pattern>
                
                <!-- 动画 -->
                <style>
                    @keyframes pulseGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
                    @keyframes slideProgress { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
                    @keyframes milestonePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
                    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
                    .milestone-marker { animation: milestonePulse 1.5s ease-in-out infinite; }
                </style>
            </defs>
            
            <!-- 深色背景 -->
            <rect width="900" height="400" fill="url(#backgroundGradient)"/>
            <rect width="900" height="400" fill="url(#gridPattern)"/>
            
            <!-- 标题区 -->
            <g class="gantt-header" transform="translate(0, 30)">
                <text x="450" y="20" text-anchor="middle" fill="#00fff2" font-size="18" font-weight="bold" filter="url(#neonGlow)">
                    ⚡ ITZY CEO Agents 改进方案 Gantt Chart ⚡
                </text>
                <text x="450" y="40" text-anchor="middle" fill="#888" font-size="11">
                    2026-04-22 → 2026-05-13 | 总进度: 60%
                </text>
            </g>
            
            <!-- 时间轴 -->
            <g class="timeline-axis" transform="translate(150, 70)">
                <!-- 时间刻度 -->
                <line x1="0" y1="0" x2="700" y2="0" stroke="#00fff2" stroke-width="2" opacity="0.5"/>
                
                <!-- 周次标记 -->
                <g class="week-markers">
                    <text x="0" y="-15" fill="#00fff2" font-size="10" text-anchor="middle">Week 1</text>
                    <line x1="0" y1="-5" x2="0" y2="5" stroke="#00fff2" stroke-width="1"/>
                    
                    <text x="233" y="-15" fill="#FF6B9D" font-size="10" text-anchor="middle">Week 2</text>
                    <line x1="233" y1="-5" x2="233" y2="5" stroke="#FF6B9D" stroke-width="1"/>
                    
                    <text x="466" y="-15" fill="#9D65FF" font-size="10" text-anchor="middle">Week 3</text>
                    <line x1="466" y1="-5" x2="466" y2="5" stroke="#9D65FF" stroke-width="1"/>
                    
                    <text x="700" y="-15" fill="#06D6A0" font-size="10" text-anchor="middle">Done</text>
                    <line x1="700" y1="-5" x2="700" y2="5" stroke="#06D6A0" stroke-width="1"/>
                </g>
                
                <!-- 日期标签 -->
                <g class="date-labels" fill="#666" font-size="8">
                    <text x="0" y="15" text-anchor="middle">04-22</text>
                    <text x="117" y="15" text-anchor="middle">04-29</text>
                    <text x="350" y="15" text-anchor="middle">05-06</text>
                    <text x="583" y="15" text-anchor="middle">05-13</text>
                </g>
            </g>
            
            <!-- ===== PHASE 1: SUBAGENT 配置 (100%) ===== -->
            <g class="phase1-gantt" transform="translate(150, 110)">
                <!-- Phase 标签 -->
                <g transform="translate(-140, 0)">
                    <rect x="0" y="-12" width="130" height="24" rx="4" fill="#06D6A0" opacity="0.2" stroke="#06D6A0" stroke-width="1"/>
                    <text x="65" y="3" text-anchor="middle" fill="#06D6A0" font-size="12" font-weight="bold">Phase 1</text>
                    <text x="65" y="15" text-anchor="middle" fill="#888" font-size="8">SUBAGENT</text>
                </g>
                
                <!-- 进度条背景 -->
                <rect x="0" y="-8" width="233" height="16" rx="8" fill="#1a1a2e" stroke="#06D6A0" stroke-width="1" opacity="0.3"/>
                
                <!-- 进度条填充 (100%) -->
                <rect x="0" y="-8" width="233" height="16" rx="8" fill="url(#progressGradientGreen)" filter="url(#neonGlowGreen)" class="pulse-glow"/>
                
                <!-- 进度百分比 -->
                <text x="250" y="3" fill="#06D6A0" font-size="10" font-weight="bold">100%</text>
                
                <!-- 任务条 -->
                <g class="task-bars" transform="translate(0, 25)">
                    <!-- T-001 ~ T-006 -->
                    <rect x="0" y="-5" width="40" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                    <rect x="40" y="-5" width="40" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                    <rect x="80" y="-5" width="20" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                    <rect x="100" y="-5" width="20" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                    <rect x="120" y="-5" width="20" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                    <rect x="140" y="-5" width="93" height="10" rx="3" fill="#06D6A0" opacity="0.7"/>
                </g>
            </g>
            
            <!-- ===== PHASE 2: 协调引擎 (50%) ===== -->
            <g class="phase2-gantt" transform="translate(150, 180)">
                <!-- Phase 标签 -->
                <g transform="translate(-140, 0)">
                    <rect x="0" y="-12" width="130" height="24" rx="4" fill="#FF6B9D" opacity="0.2" stroke="#FF6B9D" stroke-width="1"/>
                    <text x="65" y="3" text-anchor="middle" fill="#FF6B9D" font-size="12" font-weight="bold">Phase 2</text>
                    <text x="65" y="15" text-anchor="middle" fill="#888" font-size="8">协调引擎</text>
                </g>
                
                <!-- 进度条背景 -->
                <rect x="0" y="-8" width="233" height="16" rx="8" fill="#1a1a2e" stroke="#FF6B9D" stroke-width="1" opacity="0.3"/>
                
                <!-- 进度条填充 (50%) -->
                <rect x="0" y="-8" width="117" height="16" rx="8" fill="url(#progressGradientPink)" filter="url(#neonGlowPink)"/>
                
                <!-- 进度百分比 -->
                <text x="250" y="3" fill="#FF6B9D" font-size="10" font-weight="bold">50%</text>
                
                <!-- 进行中标记 -->
                <g transform="translate(120, 0)">
                    <circle r="6" fill="#FF6B9D" class="milestone-marker"/>
                    <text x="0" y="20" text-anchor="middle" fill="#FF6B9D" font-size="8">NOW</text>
                </g>
                
                <!-- 任务条 -->
                <g class="task-bars" transform="translate(0, 25)">
                    <!-- T-007 (完成) -->
                    <rect x="0" y="-5" width="40" height="10" rx="3" fill="#06D6A0" opacity="0.8"/>
                    <!-- T-008 (完成) -->
                    <rect x="40" y="-5" width="40" height="10" rx="3" fill="#06D6A0" opacity="0.8"/>
                    <!-- T-009 (完成) -->
                    <rect x="80" y="-5" width="20" height="10" rx="3" fill="#06D6A0" opacity="0.8"/>
                    <!-- T-010 (进行中) -->
                    <rect x="100" y="-5" width="133" height="10" rx="3" fill="#FF6B9D" opacity="0.6" stroke="#FF6B9D" stroke-width="1"/>
                </g>
            </g>
            
            <!-- ===== PHASE 3: 数据管道 (0%) ===== -->
            <g class="phase3-gantt" transform="translate(150, 250)">
                <!-- Phase 标签 -->
                <g transform="translate(-140, 0)">
                    <rect x="0" y="-12" width="130" height="24" rx="4" fill="#9D65FF" opacity="0.2" stroke="#9D65FF" stroke-width="1"/>
                    <text x="65" y="3" text-anchor="middle" fill="#9D65FF" font-size="12" font-weight="bold">Phase 3</text>
                    <text x="65" y="15" text-anchor="middle" fill="#888" font-size="8">数据管道</text>
                </g>
                
                <!-- 进度条背景 -->
                <rect x="233" y="-8" width="233" height="16" rx="8" fill="#1a1a2e" stroke="#9D65FF" stroke-width="1" opacity="0.3"/>
                
                <!-- 进度百分比 -->
                <text x="480" y="3" fill="#9D65FF" font-size="10" font-weight="bold">0%</text>
                
                <!-- 任务条 -->
                <g class="task-bars" transform="translate(233, 25)">
                    <!-- T-011 ~ T-014 (待执行) -->
                    <rect x="0" y="-5" width="58" height="10" rx="3" fill="#9D65FF" opacity="0.3" stroke="#9D65FF" stroke-width="0.5"/>
                    <rect x="58" y="-5" width="58" height="10" rx="3" fill="#9D65FF" opacity="0.3" stroke="#9D65FF" stroke-width="0.5"/>
                    <rect x="116" y="-5" width="58" height="10" rx="3" fill="#9D65FF" opacity="0.3" stroke="#9D65FF" stroke-width="0.5"/>
                    <rect x="175" y="-5" width="58" height="10" rx="3" fill="#9D65FF" opacity="0.3" stroke="#9D65FF" stroke-width="0.5"/>
                </g>
            </g>
            
            <!-- 里程碑标记 -->
            <g class="milestones" transform="translate(150, 320)">
                <!-- Milestone 1 -->
                <g transform="translate(233, 0)">
                    <polygon points="0,-8 8,0 0,8 -8,0" fill="#06D6A0" filter="url(#neonGlowGreen)" class="milestone-marker"/>
                    <text x="0" y="18" text-anchor="middle" fill="#06D6A0" font-size="8">M1</text>
                </g>
                
                <!-- Milestone 2 -->
                <g transform="translate(466, 0)">
                    <polygon points="0,-8 8,0 0,8 -8,0" fill="#FF6B9D" filter="url(#neonGlowPink)" class="milestone-marker"/>
                    <text x="0" y="18" text-anchor="middle" fill="#FF6B9D" font-size="8">M2</text>
                </g>
                
                <!-- Milestone 3 (最终) -->
                <g transform="translate(700, 0)">
                    <polygon points="0,-10 12,0 0,10 -12,0" fill="#00fff2" filter="url(#neonGlow)" class="milestone-marker"/>
                    <text x="0" y="18" text-anchor="middle" fill="#00fff2" font-size="8">FINAL</text>
                </g>
            </g>
            
            <!-- 进度环装饰 -->
            <g class="progress-rings" transform="translate(800, 100)">
                <!-- 外环 -->
                <circle r="40" fill="none" stroke="#00fff2" stroke-width="2" opacity="0.3"/>
                <circle r="40" fill="none" stroke="#00fff2" stroke-width="3" stroke-dasharray="240 160" filter="url(#neonGlow)" class="pulse-glow"/>
                
                <!-- 内环 -->
                <circle r="30" fill="none" stroke="#FF6B9D" stroke-width="1.5" opacity="0.4"/>
                
                <!-- 进度数字 -->
                <text x="0" y="-5" text-anchor="middle" fill="#00fff2" font-size="16" font-weight="bold">60%</text>
                <text x="0" y="12" text-anchor="middle" fill="#888" font-size="8">DONE</text>
            </g>
            
            <!-- Yuna 签名 -->
            <g class="yuna-signature" transform="translate(850, 380)">
                <text fill="#FF6B8B" font-size="10" font-style="italic" opacity="0.6">✨ Designed by YUNA</text>
            </g>
            
            <!-- 状态指示器 -->
            <g class="status-indicators" transform="translate(30, 350)">
                <g transform="translate(0, 0)">
                    <rect width="60" height="18" rx="9" fill="#06D6A0" opacity="0.2"/>
                    <circle cx="10" cy="9" r="4" fill="#06D6A0"/>
                    <text x="35" y="13" text-anchor="middle" fill="#06D6A0" font-size="8">DONE: 8</text>
                </g>
                <g transform="translate(70, 0)">
                    <rect width="80" height="18" rx="9" fill="#FF6B9D" opacity="0.2"/>
                    <circle cx="10" cy="9" r="4" fill="#FF6B9D"/>
                    <text x="45" y="13" text-anchor="middle" fill="#FF6B9D" font-size="8">IN PROGRESS: 1</text>
                </g>
                <g transform="translate(160, 0)">
                    <rect width="80" height="18" rx="9" fill="#9D65FF" opacity="0.2"/>
                    <circle cx="10" cy="9" r="4" fill="#9D65FF"/>
                    <text x="45" y="13" text-anchor="middle" fill="#9D65FF" font-size="8">PENDING: 5</text>
                </g>
            </g>
        </svg>
    </div>
    
    <!-- 图例 -->
    <div class="yuna-legend future-legend">
        <div class="legend-item future-item">
            <span class="legend-bar" style="background: linear-gradient(90deg, #06D6A0, #00fff2);"></span>
            <span>✅ Phase 1 完成 (100%)</span>
        </div>
        <div class="legend-item future-item">
            <span class="legend-bar" style="background: linear-gradient(90deg, #FF6B9D, #FF9EC4);"></span>
            <span>🔄 Phase 2 进行中 (50%)</span>
        </div>
        <div class="legend-item future-item">
            <span class="legend-bar" style="background: linear-gradient(90deg, #9D65FF, #C9A0FF); opacity: 0.5;"></span>
            <span>⏳ Phase 3 待执行 (0%)</span>
        </div>
        <div class="legend-item future-item">
            <span class="legend-milestone" style="background: #00fff2; filter: drop-shadow(0 0 3px #00fff2);"></span>
            <span>⚡ Milestone 节点</span>
        </div>
    </div>
</section>
