<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有報告 - ITZY CEO Agents</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="container">
        <!-- 導航欄 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">ITZY</div>
                <h1>CEO Agents 每日報告</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> 首頁</a>
                <a href="reports.html" class="nav-link active"><i class="fas fa-file-alt"></i> 所有報告</a>
                <a href="agents.html" class="nav-link"><i class="fas fa-robot"></i> CEO Agents</a>
                <a href="progressreport/progressreport.html" class="nav-link"><i class="fas fa-tasks"></i> 進度報告</a>
                <a href="about.html" class="nav-link"><i class="fas fa-info-circle"></i> 關於</a>
            </nav>
            <div class="date-display" id="currentDate"></div>
        </header>

        <!-- 主內容區 -->
        <main class="main-content">
            <!-- 報告過濾器 -->
            <section class="filters-section">
                <h2 class="section-title"><i class="fas fa-filter"></i> 報告過濾</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label for="agentFilter"><i class="fas fa-robot"></i> 選擇 Agent:</label>
                        <select id="agentFilter" class="filter-select">
                            <option value="all">所有 Agents</option>
                            <option value="leader">ITZY領導者</option>
                            <option value="yeji">Yeji禮志 (土木工程)</option>
                            <option value="lia">Lia (數據庫)</option>
                            <option value="chaeryeong">Chaeryeong彩領 (網站設計)</option>
                            <option value="yuna">Yuna有娜 (報告可視化)</option>
                            <option value="ryujin">Ryujin (質量測試)</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="dateFilter"><i class="fas fa-calendar"></i> 日期範圍:</label>
                        <select id="dateFilter" class="filter-select">
                            <option value="all">所有時間</option>
                            <option value="today">今日</option>
                            <option value="week">本週</option>
                            <option value="month">本月</option>
                            <option value="quarter">本季度</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="statusFilter"><i class="fas fa-check-circle"></i> 狀態:</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">所有狀態</option>
                            <option value="completed">已完成</option>
                            <option value="in_progress">進行中</option>
                        </select>
                    </div>
                    <button class="filter-btn" onclick="applyFilters()">
                        <i class="fas fa-search"></i> 篩選報告
                    </button>
                    <button class="filter-btn reset-btn" onclick="resetFilters()">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                </div>
            </section>

            <!-- 報告統計 -->
            <section class="reports-stats">
                <h2 class="section-title"><i class="fas fa-chart-pie"></i> 報告統計</h2>
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-card-icon" style="background: #FF6B9D;">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-card-content">
                            <div class="stat-card-number" id="totalReportsCount">0</div>
                            <div class="stat-card-label">總報告數</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon" style="background: #4ECDC4;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-card-content">
                            <div class="stat-card-number" id="completedReports">0</div>
                            <div class="stat-card-label">已完成</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon" style="background: #9D65FF;">
                            <i class="fas fa-spinner"></i>
                        </div>
                        <div class="stat-card-content">
                            <div class="stat-card-number" id="inProgressReports">0</div>
                            <div class="stat-card-label">進行中</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon" style="background: #FFD166;">
                            <i class="fas fa-calendar-week"></i>
                        </div>
                        <div class="stat-card-content">
                            <div class="stat-card-number" id="thisWeekReports">0</div>
                            <div class="stat-card-label">本週報告</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 所有報告列表 -->
            <section class="all-reports-section">
                <h2 class="section-title"><i class="fas fa-list"></i> 所有報告</h2>
                <div class="reports-table-container">
                    <table class="reports-table" id="reportsTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>Agent</th>
                                <th>報告標題</th>
                                <th>狀態</th>
                                <th>標籤</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTableBody">
                            <!-- 報告行將由JavaScript動態生成 -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <!-- 分頁按鈕將由JavaScript動態生成 -->
                </div>
            </section>
        </main>

        <!-- 頁腳 -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-logo">ITZY AI Agents</div>
                <div class="footer-links">
                    <a href="#"><i class="fab fa-github"></i> GitHub</a>
                    <a href="#"><i class="fas fa-book"></i> 文檔</a>
                    <a href="#"><i class="fas fa-envelope"></i> 聯絡</a>
                </div>
                <div class="footer-copyright">
                    &copy; 2025 ITZY AI Agents 系統. 基於 agency-agents-zh 框架.
                </div>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="js/data.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
